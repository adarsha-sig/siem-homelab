services:

  # ── Elasticsearch ────────────────────────────────────────────────────────────
  # Single-node, no auth (local VM only). ES_JAVA_OPTS cap prevents OOM on a
  # memory-constrained home-lab machine; raise -Xmx if you have the headroom.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: soc_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
      - ELASTIC_URL=http://localhost:9200
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - soc_net

  # ── Ollama (local LLM) ───────────────────────────────────────────────────────
  # Pull the default model once after first start:
  #   docker exec soc_ollama ollama pull llama3.2:3b
  # For higher ATT&CK mapping accuracy (more RAM, slower):
  #   docker exec soc_ollama ollama pull llama3.1:8b
  ollama:
    image: ollama/ollama:latest
    container_name: soc_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - soc_net

  # ── MLflow tracking server ───────────────────────────────────────────────────
  # Stores experiment runs, params, metrics, and artifacts on the host at
  # data/mlflow/. SQLite backend keeps dependencies minimal; swap for Postgres
  # if you need concurrent writes from multiple workers.
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: soc_mlflow
    working_dir: /mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - ./data/mlflow:/mlflow
    networks:
      - soc_net
    restart: unless-stopped

  # ── Jupyter Lab ──────────────────────────────────────────────────────────────
  # Built from our custom Dockerfile so the ML stack is baked in at image-build
  # time rather than installed on every container start.
  # ofelia labels define the cron jobs that soc_cron will exec inside this container.
  jupyter:
    build:
      context: ./docker/jupyter
      dockerfile: Dockerfile
    container_name: soc_jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
      - ELASTIC_URL=http://elasticsearch:9200
      - OLLAMA_URL=http://ollama:11434
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - SHUFFLE_WEBHOOK_URL=${SHUFFLE_WEBHOOK_URL:-}
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
      - ./src:/home/jovyan/work/src
    depends_on:
      elasticsearch:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - soc_net
    labels:
      # Retrain the IF model every night at 02:00 UTC
      ofelia.job-exec.retrain.schedule: "0 2 * * *"
      ofelia.job-exec.retrain.command: >
        python3 /home/jovyan/work/src/scheduler/nightly_retrain.py
        --run-now retrain
      # LLM enrichment sweep every Sunday at 03:00 UTC
      ofelia.job-exec.enrich.schedule: "0 3 * * 0"
      ofelia.job-exec.enrich.command: >
        python3 /home/jovyan/work/src/scheduler/nightly_retrain.py
        --run-now enrich
      # Data drift check every day at 04:00 UTC — exits 1 on failure
      ofelia.job-exec.drift.schedule: "0 4 * * *"
      ofelia.job-exec.drift.command: >
        python3 /home/jovyan/work/src/monitoring/evidently_monitor.py
      # Wazuh alert bridge — poll every 5 minutes for new alerts
      ofelia.job-exec.wazuh-bridge.schedule: "*/5 * * * *"
      ofelia.job-exec.wazuh-bridge.command: >
        python3 /home/jovyan/work/src/ingest/wazuh_bridge.py
      # Shuffle SOAR notifier — forward high-priority alerts every 5 minutes
      ofelia.job-exec.shuffle-notify.schedule: "*/5 * * * *"
      ofelia.job-exec.shuffle-notify.command: >
        python3 /home/jovyan/work/src/response/shuffle_notifier.py

  # ── Cron scheduler ───────────────────────────────────────────────────────────
  # ofelia reads the ofelia.job-exec.* labels on soc_jupyter and exec-s the
  # commands inside that container on the given cron schedule. The Python
  # scripts run once and exit — no long-running scheduler process inside Python.
  cron:
    image: mcuadros/ofelia:latest
    container_name: soc_cron
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - jupyter
    networks:
      - soc_net
    restart: unless-stopped

  # ── Streamlit dashboard ───────────────────────────────────────────────────────
  # Also built from a custom Dockerfile (slim image, only dashboard deps).
  # src/ bind-mount means code changes on the host are reflected immediately
  # (Streamlit's file watcher picks them up without a restart).
  streamlit:
    build:
      context: ./docker/streamlit
      dockerfile: Dockerfile
    container_name: soc_dashboard
    ports:
      - "8501:8501"
    environment:
      - ELASTIC_URL=http://elasticsearch:9200
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - soc_net

  # ── Shuffle SOAR ─────────────────────────────────────────────────────────────
  # Open-source SOAR platform for automated incident response workflows.
  # UI: http://localhost:3001 — first login creates the admin account.
  #
  # shuffle-database is Shuffle's private OpenSearch instance. It is NOT
  # exposed on the host to avoid colliding with soc_elasticsearch on :9200.
  # Ports:
  #   3001 — Shuffle web UI (HTTP)
  #   3443 — Shuffle web UI (HTTPS, self-signed)
  #   5001 — Shuffle backend API (used by shuffle_notifier.py webhook POSTs)
  shuffle-database:
    image: opensearchproject/opensearch:2.14.0
    container_name: shuffle_database
    hostname: shuffle-database
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
    volumes:
      - shuffle_db:/usr/share/opensearch/data
    networks:
      - soc_net
    restart: unless-stopped

  shuffle-backend:
    image: ghcr.io/shuffle/shuffle-backend:latest
    container_name: shuffle_backend
    hostname: shuffle-backend
    ports:
      - "5001:5001"
    environment:
      - SHUFFLE_ELASTIC=true
      - SHUFFLE_OPENSEARCH_URL=http://shuffle-database:9200
      - DATASTORE_EMULATOR_HOST=shuffle-database:8001
      - BASE_URL=http://localhost
      - SHUFFLE_APP_HOTLOAD_FOLDER=/shuffle-apps
      - SHUFFLE_FILE_LOCATION=/shuffle-files
      - ORG_ID=Shuffle
      - SHUFFLE_DEFAULT_USERNAME=${SHUFFLE_DEFAULT_USERNAME:-admin}
      - SHUFFLE_DEFAULT_PASSWORD=${SHUFFLE_DEFAULT_PASSWORD}
      - SHUFFLE_ENCRYPTION_MODIFIER=${SHUFFLE_ENCRYPTION_MODIFIER}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - shuffle_apps:/shuffle-apps
      - shuffle_files:/shuffle-files
    depends_on:
      - shuffle-database
    networks:
      - soc_net
    restart: unless-stopped

  shuffle-frontend:
    image: ghcr.io/shuffle/shuffle-frontend:latest
    container_name: shuffle_frontend
    hostname: shuffle-frontend
    ports:
      - "3001:80"
      - "3443:443"
    environment:
      - BACKEND_HOSTNAME=shuffle-backend
    depends_on:
      - shuffle-backend
    networks:
      - soc_net
    restart: unless-stopped

  shuffle-orborus:
    image: ghcr.io/shuffle/shuffle-orborus:latest
    container_name: shuffle_orborus
    hostname: shuffle-orborus
    environment:
      - ORG_ID=Shuffle
      - ENVIRONMENT_NAME=Shuffle
      - BASE_URL=http://shuffle-backend:5001
      - DOCKER_API_VERSION=1.44
      - CLEANUP=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - shuffle-backend
    networks:
      - soc_net
    restart: unless-stopped

volumes:
  es_data:
  ollama_models:
  shuffle_db:
  shuffle_apps:
  shuffle_files:

networks:
  soc_net:
    driver: bridge
